<svg xmlns="http://www.w3.org/2000/svg" width="5400" height="3600" viewBox="0 0 5400 3600">
  <defs>
    <style>
      .text { font-family: Arial, Helvetica, sans-serif; fill: #0f172a; }
      .muted { font-family: Arial, Helvetica, sans-serif; fill: #475569; }
      .boundary { fill: #ffffff; stroke: #0f172a; stroke-width: 7; }
      .association { fill: none; stroke: #64748b; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .actor { fill: #ffffff; stroke: #0f172a; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; }
      .student { fill: #eff6ff; stroke: #2563eb; stroke-width: 6; }
      .teacher { fill: #ecfdf5; stroke: #059669; stroke-width: 6; }
      .admin { fill: #fffbeb; stroke: #d97706; stroke-width: 6; }
      .public { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 6; }
    </style>
  </defs>

  <rect width="5400" height="3600" fill="#ffffff"/>
  <rect class="boundary" x="700" y="100" width="4000" height="3400"/>
  <rect x="770" y="143" width="275" height="82" fill="#ffffff"/>
  <text class="text" x="790" y="202" font-size="42" font-weight="800">UniTrack</text>

  <!-- Actor-to-use-case associations are drawn first so use-case symbols stay visually clean. -->
  <g class="association">
    <!-- Applicant -->
    <path d="M 405 340 H 1020"/>

    <!-- Student -->
    <path d="M 405 1040 L 1000 700"/>
    <path d="M 405 1040 H 830 V 850 H 1990"/>
    <path d="M 405 1040 H 1000"/>
    <path d="M 405 1040 H 850 V 1150 H 1990"/>
    <path d="M 405 1040 L 1000 1340"/>
    <path d="M 405 1040 H 870 V 1450 H 1990"/>

    <!-- Teacher -->
    <path d="M 405 2500 L 1000 2050"/>
    <path d="M 405 2500 H 830 V 2200 H 1990"/>
    <path d="M 405 2500 L 1000 2350"/>
    <path d="M 405 2500 H 850 V 2500 H 1990"/>
    <path d="M 405 2500 L 1000 2650"/>
    <path d="M 405 2500 H 870 V 2800 H 1990"/>
    <path d="M 405 2500 H 890 V 3100 H 1500"/>

    <!-- Admin -->
    <path d="M 4995 1150 H 4670 V 650 H 3800"/>
    <path d="M 4995 1150 L 4610 800"/>
    <path d="M 4995 1150 H 4650 V 950 H 3800"/>
    <path d="M 4995 1150 L 4610 1100"/>
    <path d="M 4995 1150 H 4630 V 1250 H 3800"/>
    <path d="M 4995 1150 L 4610 1400"/>
    <path d="M 4995 1150 H 4610 V 1550 H 3800"/>
    <path d="M 4995 1150 H 4590 V 1700 H 4610"/>
    <path d="M 4995 1150 H 4570 V 1950 H 4200"/>
  </g>

  <!-- Public access request -->
  <g>
    <ellipse class="public" cx="1400" cy="340" rx="380" ry="115"/>
    <text class="text" x="1400" y="327" text-anchor="middle" font-size="34" font-weight="800">Request Student or</text>
    <text class="text" x="1400" y="372" text-anchor="middle" font-size="34" font-weight="800">Teacher Account</text>
  </g>

  <!-- Student use cases -->
  <g>
    <ellipse class="student" cx="1350" cy="700" rx="350" ry="105"/>
    <text class="text" x="1350" y="687" text-anchor="middle" font-size="32" font-weight="800">Use Student Workspace</text>
    <text class="muted" x="1350" y="730" text-anchor="middle" font-size="23">sign in, dashboard, sign out</text>

    <ellipse class="student" cx="2350" cy="850" rx="360" ry="105"/>
    <text class="text" x="2350" y="860" text-anchor="middle" font-size="32" font-weight="800">Maintain Own Profile</text>

    <ellipse class="student" cx="1350" cy="1040" rx="350" ry="105"/>
    <text class="text" x="1350" y="1027" text-anchor="middle" font-size="31" font-weight="800">View Courses and</text>
    <text class="text" x="1350" y="1069" text-anchor="middle" font-size="31" font-weight="800">Class Routine</text>

    <ellipse class="student" cx="2350" cy="1150" rx="360" ry="105"/>
    <text class="text" x="2350" y="1160" text-anchor="middle" font-size="32" font-weight="800">Read Targeted Notices</text>

    <ellipse class="student" cx="1350" cy="1340" rx="350" ry="105"/>
    <text class="text" x="1350" y="1327" text-anchor="middle" font-size="31" font-weight="800">View and Download</text>
    <text class="text" x="1350" y="1369" text-anchor="middle" font-size="31" font-weight="800">Study Materials</text>

    <ellipse class="student" cx="2350" cy="1450" rx="360" ry="105"/>
    <text class="text" x="2350" y="1437" text-anchor="middle" font-size="30" font-weight="800">View Assignments and</text>
    <text class="text" x="2350" y="1479" text-anchor="middle" font-size="30" font-weight="800">Submit or Replace Work</text>
  </g>

  <!-- Teacher use cases -->
  <g>
    <ellipse class="teacher" cx="1350" cy="2050" rx="350" ry="105"/>
    <text class="text" x="1350" y="2037" text-anchor="middle" font-size="32" font-weight="800">Use Teacher Workspace</text>
    <text class="muted" x="1350" y="2080" text-anchor="middle" font-size="23">sign in, dashboard, sign out</text>

    <ellipse class="teacher" cx="2350" cy="2200" rx="360" ry="105"/>
    <text class="text" x="2350" y="2210" text-anchor="middle" font-size="32" font-weight="800">Maintain Own Profile</text>

    <ellipse class="teacher" cx="1350" cy="2350" rx="350" ry="105"/>
    <text class="text" x="1350" y="2337" text-anchor="middle" font-size="30" font-weight="800">View Assigned Courses</text>
    <text class="text" x="1350" y="2379" text-anchor="middle" font-size="30" font-weight="800">and Class Routine</text>

    <ellipse class="teacher" cx="2350" cy="2500" rx="360" ry="105"/>
    <text class="text" x="2350" y="2510" text-anchor="middle" font-size="32" font-weight="800">Manage Own Notices</text>

    <ellipse class="teacher" cx="1350" cy="2650" rx="350" ry="105"/>
    <text class="text" x="1350" y="2637" text-anchor="middle" font-size="30" font-weight="800">Manage Study Materials</text>
    <text class="muted" x="1350" y="2680" text-anchor="middle" font-size="23">metadata and private files</text>

    <ellipse class="teacher" cx="2350" cy="2800" rx="360" ry="105"/>
    <text class="text" x="2350" y="2810" text-anchor="middle" font-size="32" font-weight="800">Manage Assignments</text>

    <ellipse class="teacher" cx="1850" cy="3100" rx="350" ry="105"/>
    <text class="text" x="1850" y="3087" text-anchor="middle" font-size="30" font-weight="800">Review and Download</text>
    <text class="text" x="1850" y="3129" text-anchor="middle" font-size="30" font-weight="800">Student Submissions</text>
  </g>

  <!-- Admin use cases -->
  <g>
    <ellipse class="admin" cx="3450" cy="650" rx="350" ry="105"/>
    <text class="text" x="3450" y="637" text-anchor="middle" font-size="32" font-weight="800">Use Admin Workspace</text>
    <text class="muted" x="3450" y="680" text-anchor="middle" font-size="23">sign in, dashboard, sign out</text>

    <ellipse class="admin" cx="4250" cy="800" rx="360" ry="105"/>
    <text class="text" x="4250" y="787" text-anchor="middle" font-size="29" font-weight="800">Review Registration Requests</text>
    <text class="muted" x="4250" y="830" text-anchor="middle" font-size="23">approve or reject</text>

    <ellipse class="admin" cx="3450" cy="950" rx="350" ry="105"/>
    <text class="text" x="3450" y="960" text-anchor="middle" font-size="32" font-weight="800">Manage Students</text>

    <ellipse class="admin" cx="4250" cy="1100" rx="360" ry="105"/>
    <text class="text" x="4250" y="1110" text-anchor="middle" font-size="32" font-weight="800">Manage Teachers</text>

    <ellipse class="admin" cx="3450" cy="1250" rx="350" ry="105"/>
    <text class="text" x="3450" y="1260" text-anchor="middle" font-size="32" font-weight="800">Manage Courses</text>

    <ellipse class="admin" cx="4250" cy="1400" rx="360" ry="105"/>
    <text class="text" x="4250" y="1410" text-anchor="middle" font-size="31" font-weight="800">Manage Class Routines</text>

    <ellipse class="admin" cx="3450" cy="1550" rx="350" ry="105"/>
    <text class="text" x="3450" y="1560" text-anchor="middle" font-size="32" font-weight="800">Manage Notices</text>

    <ellipse class="admin" cx="4250" cy="1700" rx="360" ry="105"/>
    <text class="text" x="4250" y="1687" text-anchor="middle" font-size="30" font-weight="800">Manage Study Materials</text>
    <text class="muted" x="4250" y="1730" text-anchor="middle" font-size="23">metadata and private files</text>

    <ellipse class="admin" cx="3850" cy="1950" rx="350" ry="105"/>
    <text class="text" x="3850" y="1937" text-anchor="middle" font-size="29" font-weight="800">Manage Assignments and</text>
    <text class="text" x="3850" y="1979" text-anchor="middle" font-size="29" font-weight="800">Review Submissions</text>
  </g>

  <!-- Actors -->
  <g>
    <circle class="actor" cx="300" cy="210" r="50"/>
    <path class="actor" d="M 300 260 V 410 M 215 315 H 385 M 300 410 L 225 520 M 300 410 L 375 520"/>
    <text class="text" x="300" y="585" text-anchor="middle" font-size="38" font-weight="800">Applicant</text>
    <text class="muted" x="300" y="628" text-anchor="middle" font-size="24">Student or Teacher</text>
  </g>

  <g>
    <circle class="actor" cx="300" cy="875" r="50"/>
    <path class="actor" d="M 300 925 V 1075 M 215 980 H 385 M 300 1075 L 225 1185 M 300 1075 L 375 1185"/>
    <text class="text" x="300" y="1250" text-anchor="middle" font-size="40" font-weight="800">Student</text>
  </g>

  <g>
    <circle class="actor" cx="300" cy="2335" r="50"/>
    <path class="actor" d="M 300 2385 V 2535 M 215 2440 H 385 M 300 2535 L 225 2645 M 300 2535 L 375 2645"/>
    <text class="text" x="300" y="2710" text-anchor="middle" font-size="40" font-weight="800">Teacher</text>
  </g>

  <g>
    <circle class="actor" cx="5100" cy="985" r="50"/>
    <path class="actor" d="M 5100 1035 V 1185 M 5015 1090 H 5185 M 5100 1185 L 5025 1295 M 5100 1185 L 5175 1295"/>
    <text class="text" x="5100" y="1360" text-anchor="middle" font-size="40" font-weight="800">Admin</text>
  </g>
</svg>
